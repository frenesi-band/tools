<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools — FRENESÍ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --c1: #a3aaae;
  --c2: #565e64;
  --c3: #333f46;
  --c4: #27323c;
  --c5: #0b1f28;
  --cream: #e8e0d4;
  --warm: #c9b99a;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--c5);
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.45;
  mix-blend-mode: overlay;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 36px,
    rgba(163,170,174,0.05) 36px, rgba(163,170,174,0.05) 37px
  );
  pointer-events: none;
  z-index: 0;
}

#grain-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999; opacity: 0.06;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2.5rem;
  backdrop-filter: blur(12px);
  background: rgba(11,31,40,0.7);
  border-bottom: 1px solid rgba(163,170,174,0.1);
}

.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 0.18em;
  color: var(--cream);
  text-decoration: none;
  display: inline-block;
  width: fit-content;
  position: relative;
}
.nav-logo::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--warm);
  transition: width 0.4s ease;
}
.nav-logo:hover::after { width: 100%; }

.nav-back {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c1);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-back:hover { color: var(--cream); }
.nav-back svg { transition: transform 0.3s; }
.nav-back:hover svg { transform: translateX(-3px); }

/* ── PAGE ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 8rem 2.5rem 6rem;
}

/* ── HEADER ── */
.page-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  color: var(--warm);
  text-transform: uppercase;
  margin-bottom: 0.8rem;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.2s forwards;
}

.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 9vw, 6rem);
  line-height: 0.9;
  letter-spacing: 0.02em;
  color: var(--cream);
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.35s forwards;
}

.page-title span {
  color: transparent;
  -webkit-text-stroke: 1.5px var(--c1);
}

.page-subtitle {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--c2);
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid rgba(163,170,174,0.12);
  opacity: 0;
  animation: fadeUp 0.8s ease 0.5s forwards;
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid rgba(163,170,174,0.15);
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.55s forwards;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  flex: 1;
  padding: 0.7rem 1.6rem 0.8rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c2);
  text-align: center;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn.active {
  color: var(--cream);
  border-bottom-color: var(--warm);
}

.tab-btn:hover:not(.active) { color: var(--c1); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── BPM DISPLAY ── */
.bpm-display {
  text-align: center;
  margin-bottom: 2.5rem;
}

.bpm-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 18vw, 8rem);
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--cream);
  transition: color 0.05s;
}

.bpm-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--c2);
  margin-top: 0.3rem;
}

.tempo-name {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--warm);
  margin-top: 0.3rem;
  min-height: 1.4em;
}

/* ── PENDULUM ── */
.pendulum-wrap {
  display: flex;
  justify-content: center;
  margin: 1rem 0 2rem;
}

/* ── BEAT DOTS ── */
.beat-grid {
  display: flex;
  justify-content: center;
  gap: 0.7rem;
  margin-bottom: 2.5rem;
}

.beat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid var(--c2);
  background: transparent;
  transition: background 0.05s, border-color 0.05s;
}

.beat-dot.on { background: var(--warm); border-color: var(--warm); }
.beat-dot.accent { width: 14px; height: 14px; border-color: var(--c1); }
.beat-dot.accent.on { background: var(--cream); border-color: var(--cream); }

/* ── SLIDER ── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1.8rem;
}

.slider-row label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--c2);
  width: 2.5rem;
  flex-shrink: 0;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 1px;
  background: rgba(163,170,174,0.25);
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cream);
  border: 2px solid var(--c5);
  box-shadow: 0 0 0 1px var(--c1);
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  background: var(--warm);
  box-shadow: 0 0 0 1px var(--warm);
}

.slider-val {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  min-width: 2.5rem;
  text-align: right;
  color: var(--c1);
}

/* ── TIME SIG ── */
.sig-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 2rem;
}

.sig-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c2);
}

.sig-spinner {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border: 1px solid rgba(163,170,174,0.2);
  padding: 0.5rem 1rem;
}

.sig-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.15rem;
}

.spin-btn {
  background: none;
  border: none;
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  line-height: 1;
  color: var(--c2);
  cursor: pointer;
  padding: 0.15rem 0.4rem;
  transition: color 0.15s;
  user-select: none;
}
.spin-btn:hover { color: var(--warm); }

.sig-fraction {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  min-width: 3rem;
  justify-content: center;
}

#sig-top, #sig-bottom {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  line-height: 1;
  min-width: 1.2rem;
  text-align: center;
  color: var(--cream);
  transition: color 0.15s;
}

.sig-slash {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  color: var(--c2);
  line-height: 1;
}

/* ── BUTTONS ── */
.btn-row {
  display: flex;
  gap: 0.8rem;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.btn {
  background: transparent;
  border: 1px solid rgba(163,170,174,0.3);
  padding: 0.65rem 1.8rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c1);
  cursor: pointer;
  transition: all 0.25s;
}
.btn:hover { border-color: var(--c1); color: var(--cream); }

.btn.primary {
  background: var(--cream);
  color: var(--c5);
  border-color: var(--cream);
  font-weight: 700;
}
.btn.primary:hover {
  background: var(--warm);
  border-color: var(--warm);
}

/* ── DIVIDER ── */
.divider {
  border: none;
  border-top: 1px solid rgba(163,170,174,0.1);
  margin: 2rem 0;
}

/* ── TUNER ── */
.tuner-display {
  text-align: center;
  margin-bottom: 1.5rem;
}

.note-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 18vw, 8rem);
  line-height: 1;
  letter-spacing: 0.05em;
  color: var(--cream);
}

.note-big .octave {
  font-family: 'Space Mono', monospace;
  font-size: 0.3em;
  vertical-align: super;
  color: var(--c2);
}

.freq-display {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--c2);
  margin-top: 0.5rem;
  min-height: 1.2em;
  letter-spacing: 0.1em;
}

.meter-wrap {
  margin: 1.5rem auto;
  max-width: 420px;
  position: relative;
}

.meter-bar {
  height: 2px;
  background: rgba(163,170,174,0.2);
  position: relative;
  overflow: visible;
}

.meter-center {
  position: absolute;
  left: 50%; top: -8px;
  transform: translateX(-50%);
  width: 1px;
  height: 18px;
  background: var(--c1);
  opacity: 0.4;
}

.meter-needle {
  position: absolute;
  top: -8px;
  width: 3px; height: 18px;
  background: var(--warm);
  border-radius: 1px;
  transform: translateX(-50%);
  transition: left 0.12s ease-out;
  left: 50%;
}

.meter-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 0.8rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: var(--c2);
  letter-spacing: 0.05em;
}

.tune-status {
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 1rem;
  min-height: 1.2em;
  color: var(--warm);
  transition: color 0.2s;
}

.tune-status.in-tune { color: #6dbf67; }

.ref-row {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  max-width: 420px;
  margin: 1.5rem auto;
}

.ref-row label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--c2);
  width: 4rem;
  flex-shrink: 0;
}

/* ── CHROMATIC GRID ── */
.chroma-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  margin: 0.5rem 0 1.5rem;
}

.note-pill {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  padding: 0.3rem 0.65rem;
  border: 1px solid rgba(163,170,174,0.15);
  color: var(--c2);
  min-width: 2.4rem;
  text-align: center;
  transition: all 0.1s;
}

.note-pill.active {
  background: var(--cream);
  color: var(--c5);
  border-color: var(--cream);
}

.note-pill.close {
  border-color: var(--warm);
  color: var(--warm);
}

.mic-status {
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--c2);
  margin-bottom: 1.5rem;
}

/* ── INSTRUMENT SELECTOR ── */
.instrument-selector {
  display: flex;
  gap: 0;
  border: 1px solid rgba(163,170,174,0.2);
  width: fit-content;
  margin: 0 auto 1.8rem;
}

.inst-btn {
  background: transparent;
  border: none;
  padding: 0.55rem 1.8rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c2);
  cursor: pointer;
  transition: all 0.2s;
}

.inst-btn:first-child {
  border-right: 1px solid rgba(163,170,174,0.2);
}

.inst-btn.active {
  background: var(--cream);
  color: var(--c5);
  font-weight: 700;
}

.inst-btn:hover:not(.active) { color: var(--c1); }

/* ── STRING GRID ── */
.string-grid {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.string-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  border: 1px solid rgba(163,170,174,0.15);
  padding: 0.6rem 0.5rem;
  min-width: 48px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.string-card:hover {
  border-color: var(--c1);
}

.string-card.highlight {
  border-color: var(--warm);
  background: rgba(201,185,154,0.08);
}

.string-card.in-tune {
  border-color: #6dbf67;
  background: rgba(109,191,103,0.08);
}

.string-num {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  color: var(--c2);
}

.string-note {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  line-height: 1;
  color: var(--cream);
  transition: color 0.2s;
}

.string-card.highlight .string-note { color: var(--warm); }
.string-card.in-tune .string-note { color: #6dbf67; }

.string-freq {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  color: var(--c2);
  letter-spacing: 0.05em;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .page { padding: 6rem 1.2rem 4rem; }
  .page-title { font-size: 3.2rem; }
  .tab-btn { padding: 0.6rem 1rem; font-size: 0.6rem; }
}
</style>
</head>
<body>

<canvas id="grain-canvas"></canvas>

<nav>
  <a href="https://frenesi.com.ar" class="nav-logo">FRENESÍ</a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver
  </a>
</nav>

<div class="page">

  <div class="tabs">
    <button class="tab-btn active" data-tab="metro">♩ Metrónomo</button>
    <button class="tab-btn" data-tab="tuner">♪ Afinador</button>
  </div>

  <!-- ══ METRONOME ══ -->
  <div class="tab-panel active" id="tab-metro">

    <div class="bpm-display">
      <div class="bpm-number" id="bpm-num">120</div>
      <div class="bpm-label">BPM</div>
      <div class="tempo-name" id="tempo-name">Allegro</div>
    </div>

    <div class="pendulum-wrap">
      <svg id="pendulum-svg" width="80" height="100" viewBox="0 0 80 100" overflow="visible">
        <line x1="40" y1="8" x2="40" y2="85" stroke="rgba(163,170,174,0.3)" stroke-width="1.5" id="pend-line"/>
        <circle id="pend-bob" cx="40" cy="85" r="8" fill="var(--cream)"/>
        <circle cx="40" cy="8" r="3" fill="var(--warm)"/>
      </svg>
    </div>

    <div class="beat-grid" id="beat-grid"></div>

    <div class="slider-row">
      <label>BPM</label>
      <button class="spin-btn" id="bpm-minus">−</button>
      <input type="range" id="bpm-slider" min="30" max="240" value="120" step="1">
      <button class="spin-btn" id="bpm-plus">+</button>
      <span class="slider-val" id="bpm-slider-val">120</span>
    </div>

    <div class="sig-row">
      <div class="sig-spinner">
        <div class="sig-col">
          <button class="spin-btn" id="sig-num-plus">+</button>
          <span id="sig-top">4</span>
          <button class="spin-btn" id="sig-num-minus">−</button>
        </div>
        <span class="sig-slash">/</span>
        <div class="sig-col">
          <button class="spin-btn" id="sig-den-plus">+</button>
          <span id="sig-bottom">4</span>
          <button class="spin-btn" id="sig-den-minus">−</button>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="tap-btn">Tap</button>
      <button class="btn primary" id="play-btn">▶ Iniciar</button>
    </div>

  </div>

  <!-- ══ TUNER ══ -->
  <div class="tab-panel" id="tab-tuner">

    <!-- Instrument selector -->
    <div class="instrument-selector">
      <button class="inst-btn active" data-inst="guitar">Guitarra</button>
      <button class="inst-btn" data-inst="bass">Bajo</button>
    </div>

    <!-- String reference -->
    <div class="string-grid" id="string-grid"></div>

    <hr class="divider">

    <p class="mic-status" id="mic-status">Presioná "Activar micrófono" para afinar</p>

    <div class="tuner-display">
      <div class="note-big" id="note-display">–<span class="octave"></span></div>
      <div class="freq-display" id="freq-display"></div>
    </div>

    <div class="meter-wrap">
      <div class="meter-bar">
        <div class="meter-center"></div>
        <div class="meter-needle" id="meter-needle"></div>
      </div>
      <div class="meter-labels">
        <span>−50¢</span><span>−25¢</span><span>0</span><span>+25¢</span><span>+50¢</span>
      </div>
    </div>

    <div class="tune-status" id="tune-status"></div>

    <div class="chroma-grid" id="chroma-grid"></div>

    <hr class="divider">

    <div class="ref-row">
      <label>La ref.</label>
      <input type="range" id="ref-slider" min="430" max="450" value="440" step="1">
      <span class="slider-val" id="ref-val">440 Hz</span>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="mic-btn">Activar micrófono</button>
    </div>

  </div>

</div>

<script>
/* ── GRAIN ── */
const canvas = document.getElementById('grain-canvas');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
function generateNoise() {
  const d = ctx.createImageData(w, h).data;
  const img = ctx.createImageData(w, h);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 28 | 0;
  }
  ctx.putImageData(img, 0, 0);
}
function animateGrain() { generateNoise(); requestAnimationFrame(animateGrain); }
window.addEventListener('resize', resize);
resize(); animateGrain();

/* ── UTILITIES ── */
const $ = id => document.getElementById(id);

/* ── TABS ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── METRONOME ── */
const TEMPOS = [
  [20,'Larghissimo'],[40,'Largo'],[60,'Larghetto'],[66,'Adagio'],
  [76,'Andante'],[108,'Moderato'],[120,'Allegretto'],[132,'Allegro'],
  [168,'Presto'],[200,'Prestissimo'],[999,'Prestissimo']
];
function getTempoName(bpm) {
  for (let i = 0; i < TEMPOS.length - 1; i++)
    if (bpm < TEMPOS[i+1][0]) return TEMPOS[i][1];
  return 'Prestissimo';
}

let bpm = 120, beats = 4, isPlaying = false;
let audioCtx = null;
let tapTimes = [], tapTimer = null;
let pendAngle = 0, pendDir = 1, pendAnimId = null, pendLastTime = null, pendStartTime = 0;
const LOOKAHEAD = 0.1, SCHEDULE_MS = 25;
let nextBeatTime = 0, currentBeat = 0, schedulerTimer = null, visualQueue = [];

function buildBeatGrid() {
  const grid = $('beat-grid');
  grid.innerHTML = '';
  for (let i = 0; i < beats; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot' + (i === 0 ? ' accent' : '');
    grid.appendChild(d);
  }
}

function updateBeatDots(beat) {
  document.querySelectorAll('.beat-dot').forEach((d, i) => d.classList.toggle('on', i === beat));
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function scheduleClick(audioTime, accent) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = accent ? 1200 : 800;
  gain.gain.setValueAtTime(accent ? 0.55 : 0.3, audioTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioTime + 0.08);
  osc.start(audioTime); osc.stop(audioTime + 0.1);
}

function beatDuration() {
  return (60 / bpm) * (4 / SIG_DENOMINATORS[sigDenIdx]);
}

function scheduler() {
  const ctx = getAudioCtx();
  while (nextBeatTime < ctx.currentTime + LOOKAHEAD) {
    scheduleClick(nextBeatTime, currentBeat === 0);
    visualQueue.push({ time: nextBeatTime, beat: currentBeat });
    currentBeat = (currentBeat + 1) % beats;
    nextBeatTime += beatDuration();
  }
}

function visualLoop(ts) {
  if (!isPlaying) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  while (visualQueue.length && visualQueue[0].time <= now + 0.01) {
    const evt = visualQueue.shift();
    updateBeatDots(evt.beat);
    $('bpm-num').style.color = 'var(--warm)';
    setTimeout(() => { $('bpm-num').style.color = ''; }, 60);
  }
  pendAnimId = requestAnimationFrame(visualLoop);
  animatePendulumStep();
}

function animatePendulumStep() {
  // One full swing (left → right → left) takes 2 beat durations.
  // We derive the angle purely from audio clock so it never drifts.
  const ctx = getAudioCtx();
  const elapsed = ctx.currentTime - pendStartTime;
  const period = beatDuration() * 2;           // full oscillation = 2 beats
  const phase = (elapsed % period) / period;   // 0..1
  // cos gives natural easing: starts at +MAX, swings to -MAX, back
  const angle = 30 * Math.cos(phase * 2 * Math.PI);
  const rad = angle * Math.PI / 180;
  const x = 40 + 77 * Math.sin(rad);
  const y = 8  + 77 * Math.cos(rad);
  $('pend-bob').setAttribute('cx', x.toFixed(2));
  $('pend-bob').setAttribute('cy', y.toFixed(2));
  $('pend-line').setAttribute('x2', x.toFixed(2));
  $('pend-line').setAttribute('y2', y.toFixed(2));
}

function startMetro() {
  if (isPlaying) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  isPlaying = true; currentBeat = 0;
  nextBeatTime = ctx.currentTime + 0.05;
  pendStartTime = ctx.currentTime;
  visualQueue = [];
  $('play-btn').textContent = '■ Detener';
  pendLastTime = null;
  scheduler();
  schedulerTimer = setInterval(scheduler, SCHEDULE_MS);
  pendAnimId = requestAnimationFrame(visualLoop);
}

function stopMetro() {
  isPlaying = false;
  clearInterval(schedulerTimer);
  cancelAnimationFrame(pendAnimId);
  visualQueue = [];
  $('play-btn').textContent = '▶ Iniciar';
  updateBeatDots(-1);
  pendAngle = 0;
  $('pend-bob').setAttribute('cx', 40); $('pend-bob').setAttribute('cy', 85);
  $('pend-line').setAttribute('x2', 40); $('pend-line').setAttribute('y2', 85);
}

function setBPM(val) {
  bpm = Math.max(30, Math.min(240, val));
  $('bpm-num').textContent = bpm;
  $('bpm-slider').value = bpm;
  $('bpm-slider-val').textContent = bpm;
  $('tempo-name').textContent = getTempoName(bpm);
}

$('play-btn').addEventListener('click', () => isPlaying ? stopMetro() : startMetro());
$('bpm-slider').addEventListener('input', e => setBPM(+e.target.value));
$('bpm-minus').addEventListener('click', () => setBPM(bpm - 1));
$('bpm-plus').addEventListener('click',  () => setBPM(bpm + 1));

$('tap-btn').addEventListener('click', () => {
  const now = Date.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapTimes = []; }, 2500);
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
    setBPM(Math.round(60000 / (intervals.reduce((a,b) => a+b, 0) / intervals.length)));
  }
});

const SIG_NUMERATORS   = [2,3,4,5,6,7,8,9,12];
const SIG_DENOMINATORS = [2,4,8,16];
let sigNumIdx = 2, sigDenIdx = 1;

function flash(el) {
  el.style.color = 'var(--warm)';
  setTimeout(() => { el.style.color = ''; }, 180);
}

function updateSig() {
  beats = SIG_NUMERATORS[sigNumIdx];
  $('sig-top').textContent = beats;
  $('sig-bottom').textContent = SIG_DENOMINATORS[sigDenIdx];
  currentBeat = 0;
  buildBeatGrid();
}

$('sig-num-minus').addEventListener('click', () => { sigNumIdx = Math.max(0, sigNumIdx-1); flash($('sig-top')); updateSig(); });
$('sig-num-plus').addEventListener('click',  () => { sigNumIdx = Math.min(SIG_NUMERATORS.length-1, sigNumIdx+1); flash($('sig-top')); updateSig(); });
$('sig-den-minus').addEventListener('click', () => { sigDenIdx = Math.max(0, sigDenIdx-1); flash($('sig-bottom')); updateSig(); });
$('sig-den-plus').addEventListener('click',  () => { sigDenIdx = Math.min(SIG_DENOMINATORS.length-1, sigDenIdx+1); flash($('sig-bottom')); updateSig(); });

beats = SIG_NUMERATORS[sigNumIdx];
$('sig-top').textContent = beats;
$('sig-bottom').textContent = SIG_DENOMINATORS[sigDenIdx];
buildBeatGrid();
$('tempo-name').textContent = getTempoName(bpm);

/* ── INSTRUMENTS ── */
const INSTRUMENTS = {
  guitar: {
    strings: [
      { num: '6', note: 'E', octave: 2, freq: 82.4  },
      { num: '5', note: 'A', octave: 2, freq: 110.0 },
      { num: '4', note: 'D', octave: 3, freq: 146.8 },
      { num: '3', note: 'G', octave: 3, freq: 196.0 },
      { num: '2', note: 'B', octave: 3, freq: 246.9 },
      { num: '1', note: 'E', octave: 4, freq: 329.6 },
    ]
  },
  bass: {
    strings: [
      { num: '4', note: 'E', octave: 1, freq: 41.2  },
      { num: '3', note: 'A', octave: 1, freq: 55.0  },
      { num: '2', note: 'D', octave: 2, freq: 73.4  },
      { num: '1', note: 'G', octave: 2, freq: 98.0  },
    ]
  }
};

let currentInst = 'guitar';

function buildStringGrid() {
  const sgrid = document.getElementById('string-grid');
  const strings = INSTRUMENTS[currentInst].strings;
  sgrid.innerHTML = '';
  strings.forEach(s => {
    const card = document.createElement('div');
    card.className = 'string-card';
    card.dataset.note = s.note;
    card.dataset.octave = s.octave;
    card.innerHTML = `
      <span class="string-num">${s.num}ª</span>

    `;
    sgrid.appendChild(card);

}

document.querySelectorAll('.inst-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInst = btn.dataset.inst;
    buildStringGrid();
  });
});

buildStringGrid();

/* ── TUNER ── */
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let refA = 440, tunerActive = false;
let analyserNode = null, tunerAnimId = null, micStream = null;

const grid = $('chroma-grid');
NOTES.forEach(n => {
  const span = document.createElement('span');
  span.className = 'note-pill';
  span.textContent = n;
  span.dataset.note = n;
  grid.appendChild(span);
});

function freqToNote(freq) {
  const semitones = 12 * Math.log2(freq / refA);
  const midi = Math.round(semitones) + 69;
  const noteIdx = ((midi % 12) + 12) % 12;
  const octave = Math.floor(midi / 12) - 1;
  const cents = Math.round((semitones + 69 - midi) * 1000) / 10;
  return { name: NOTES[noteIdx], octave, cents };
}

function autoCorrelate(buf, sampleRate) {
  let SIZE = buf.length, rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;
  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE/2; i++) { if (Math.abs(buf[i])   < 0.2) { r1 = i; break; } }
  for (let i = 1; i < SIZE/2; i++) { if (Math.abs(buf[SIZE-i]) < 0.2) { r2 = SIZE-i; break; } }
  buf = buf.slice(r1, r2); SIZE = buf.length;
  const c = new Float32Array(SIZE).fill(0);
  for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE-i; j++) c[i] += buf[j]*buf[j+i];
  let d = 0; while (c[d] > c[d+1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
  let T0 = maxpos;
  const x1 = c[T0-1], x2 = c[T0], x3 = c[T0+1];
  const a = (x1+x3-2*x2)/2, b = (x3-x1)/2;
  if (a) T0 = T0 - b/(2*a);
  return sampleRate / T0;
}

function updateTuner() {
  if (!analyserNode || !tunerActive) return;
  const buf = new Float32Array(analyserNode.fftSize);
  analyserNode.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, analyserNode.context.sampleRate);

  if (freq > 30 && freq < 5000) {
    const { name, octave, cents } = freqToNote(freq);
    $('note-display').innerHTML = name + `<span class="octave">${octave}</span>`;
    $('freq-display').textContent = freq.toFixed(1) + ' Hz';
    $('meter-needle').style.left = Math.max(0, Math.min(100, 50 + cents)) + '%';
    const absCents = Math.abs(cents);
    const st = $('tune-status');
    if (absCents < 5) { st.textContent = 'En tono ✓'; st.className = 'tune-status in-tune'; }
    else if (cents < 0) { st.textContent = `Muy bajo (${cents}¢)`; st.className = 'tune-status'; }
    else { st.textContent = `Muy alto (+${cents}¢)`; st.className = 'tune-status'; }

    // Highlight chromatic pills
    document.querySelectorAll('.note-pill').forEach(p => {
      p.classList.remove('active','close');
      if (p.dataset.note === name) p.classList.add(absCents < 5 ? 'active' : 'close');
    });

    // Highlight matching string card
    document.querySelectorAll('.string-card').forEach(card => {
      card.classList.remove('highlight', 'in-tune');
      if (card.dataset.note === name && parseInt(card.dataset.octave) === octave) {
        card.classList.add(absCents < 5 ? 'in-tune' : 'highlight');
      }
    });
  } else {
    $('note-display').innerHTML = '–<span class="octave"></span>';
    $('freq-display').textContent = '';
    $('tune-status').textContent = 'Sin señal';
    $('tune-status').className = 'tune-status';
    $('meter-needle').style.left = '50%';
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active','close'));
    document.querySelectorAll('.string-card').forEach(c => c.classList.remove('highlight','in-tune'));
  }
  tunerAnimId = requestAnimationFrame(updateTuner);
}

$('mic-btn').addEventListener('click', async () => {
  if (tunerActive) {
    tunerActive = false;
    cancelAnimationFrame(tunerAnimId);
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    $('mic-btn').textContent = 'Activar micrófono';
    $('mic-status').textContent = 'Micrófono desactivado';
    $('note-display').innerHTML = '–<span class="octave"></span>';
    $('freq-display').textContent = '';
    $('tune-status').textContent = '';
    $('meter-needle').style.left = '50%';
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active','close'));
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const actx = getAudioCtx();
    const src = actx.createMediaStreamSource(micStream);
    analyserNode = actx.createAnalyser();
    analyserNode.fftSize = 2048;
    src.connect(analyserNode);
    tunerActive = true;
    $('mic-btn').textContent = '■ Desactivar';
    $('mic-status').textContent = 'Escuchando…';
    updateTuner();
  } catch (e) {
    $('mic-status').textContent = 'No se pudo acceder al micrófono.';
  }
});

$('ref-slider').addEventListener('input', e => {
  refA = +e.target.value;
  $('ref-val').textContent = refA + ' Hz';
});
</script>
